server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: neznámé cesty servíruj přes index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html se nikdy necachuje → appka/prohlížeč vždy načte aktuální verzi
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # hashované assety (mají v názvu hash) se mohou cachovat natrvalo
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API proxy -> kontejner 'api'
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
